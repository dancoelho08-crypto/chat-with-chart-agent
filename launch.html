<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Chart — Launching…</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f5;
      color: #0f1419;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #d4d2c8;
      border-top-color: #0c4a6e;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message {
      color: #3a4148;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p class="message">Connecting to your health record system…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
  <script>
    FHIR.oauth2.authorize({
      clientId: "chat-with-chart-agent",
      scope: "launch openid fhirUser patient/Patient.read patient/Condition.read patient/MedicationRequest.read patient/AllergyIntolerance.read patient/Observation.read patient/Encounter.read patient/Immunization.read",
      redirectUri: "index.html"
    });
  </script>
</body>
</html>
